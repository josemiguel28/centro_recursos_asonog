; ─── PHP — Subida de archivos (PHP-FPM / FastCGI / cPanel) ──────────────────
; Este archivo aplica cuando el hosting usa PHP-FPM o FastCGI (más común en
; cPanel con WHM). Los valores en .htaccess (php_value) son ignorados en ese
; caso; .user.ini es la alternativa correcta.
;
; IMPORTANTE: después de subir este archivo al servidor, los cambios pueden
; tardar hasta 5 minutos en aplicarse (según user_ini.cache_ttl del servidor).

upload_max_filesize = 100M
post_max_size       = 110M
memory_limit        = 256M
max_execution_time  = 300
max_input_time      = 300
